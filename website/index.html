    // 构建树形结构
    function buildTree() {
      const tree = {};
      
      for (const [file, content] of Object.entries(BRIEFS_DATA)) {
        const dateMatch = file.match(/brief-(\d{4})-(\d{2})-(\d{2})\.md/);
        if (!dateMatch) continue;
        
        const [, year, month, day] = dateMatch;
        
        if (!tree[year]) tree[year] = {};
        if (!tree[year][month]) tree[year][month] = {};
        tree[year][month][day] = { file, content };
      }
      
      return tree;
    }
    
    // 渲染导航树
    function renderNavTree() {
      const tree = buildTree();
      const navTree = document.getElementById('navTree');
      
      for (const [year, months] of Object.entries(tree).sort((a, b) => b[0] - a[0])) {
        const yearItem = document.createElement('li');
        yearItem.className = 'nav-item';
        yearItem.innerHTML = `
          <div class="nav-header" onclick="toggleYear(this)">
            <span class="arrow">▶</span>
            <span>${year}年</span>
          </div>
          <ul class="nav-children" id="year-${year}"></ul>
        `;
        navTree.appendChild(yearItem);
        
        const monthList = yearItem.querySelector('.nav-children');
        for (const [month, days] of Object.entries(months).sort((a, b) => b[0] - a[0])) {
          const monthItem = document.createElement('li');
          monthItem.innerHTML = `
            <div class="nav-month" onclick="toggleMonth(this)">
              ${month}月
            </div>
            <ul class="nav-children" id="month-${year}-${month}"></ul>
          `;
          monthList.appendChild(monthItem);
          
          const dayList = monthItem.querySelector('.nav-children');
          for (const day of Object.keys(days).sort((a, b) => b[0] - a[0])) {
            const dayItem = document.createElement('li');
            dayItem.className = 'nav-day';
            dayItem.textContent = `${day}日`;
            dayItem.onclick = () => selectDate(year, month, day, dayItem);
            dayList.appendChild(dayItem);
          }
        }
      }
    }
    
    function toggleYear(header) {
      header.classList.toggle('expanded');
      const children = header.nextElementSibling;
      children.classList.toggle('expanded');
    }
    
    function toggleMonth(monthEl) {
      const children = monthEl.nextElementSibling;
      children.classList.toggle('expanded');
    }
    
    function selectDate(year, month, day, el) {
      // 更新激活状态
      document.querySelectorAll('.nav-day').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
      
      // 加载简报
      const tree = buildTree();
      const brief = tree[year][month][day];
      renderBrief(brief.content, `${year}-${month}-${day}`);
    }
    
    // 解析 Markdown
    function parseMarkdown(md) {
      let html = md;
      html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
      html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
      html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      html = html.replace(/^- (.*$)/gm, '<li>$1</li>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }
    
    // 渲染简报内容
    function renderBrief(content, date) {
      const main = document.getElementById('main');
      const html = parseMarkdown(content);
      
      // 提取前几行作为预览
      const lines = content.split('\n').filter(l => l.startsWith('- ')).slice(0, 3);
      const preview = lines.map(l => l.replace(/^- /, '')).join('<br>');
      
      main.innerHTML = `
        <div class="brief-content">
          ${html}
          <div class="brief-meta">
            🦐 由 AI Intelligence Brief 自动生成 | 日期：${date}
          </div>
        </div>
      `;
    }
    
    // 渲染日期卡片网格
    function renderCardsGrid() {
      const tree = buildTree();
      const main = document.getElementById('main');
      
      let cardsHtml = '';
      for (const [year, months] of Object.entries(tree).sort((a, b) => b[0] - a[0])) {
        for (const [month, days] of Object.entries(months).sort((a, b) => b[0] - a[0])) {
          for (const [day, { content }] of Object.entries(days).sort((a, b) => b[0] - a[0])) {
            const date = `${year}-${month}-${day}`;
            const lines = content.split('\n').filter(l => l.startsWith('- ')).slice(0, 3);
            const preview = lines.map(l => l.replace(/^- /, '').replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')).join('... ');
            
            cardsHtml += `
              <div class="date-card" onclick="loadBrief('${year}', '${month}', '${day}')">
                <div class="date">${year}/${month}/${day}</div>
                <div class="preview">${preview || '暂无内容'}</div>
                <div class="stats">
                  <span>📰 AI 简报</span>
                </div>
              </div>
            `;
          }
        }
      }
      
      main.innerHTML = `
        <div class="main-header">
          <h2>所有简报</h2>
          <p>点击卡片查看详情</p>
        </div>
        <div class="cards-grid">${cardsHtml}</div>
      `;
    }
    
    function loadBrief(year, month, day) {
      const tree = buildTree();
      const brief = tree[year][month][day];
      renderBrief(brief.content, `${year}-${month}-${day}`);
    }
    
    // 初始化
    renderNavTree();
    renderCardsGrid();
  </script>
</body>
