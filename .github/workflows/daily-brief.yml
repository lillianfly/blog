name: 每日 AI 简报

on:
  schedule:
    # 每天 11:00 (UTC+8) = 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装依赖
        run: |
          cd ai-intel-brief
          npm install
      
      - name: 生成今日简报
        run: |
          cd ai-intel-brief
          node index.js
      
      - name: 构建网站
        run: |
          cd ai-intel-brief/website
          node build.js
      
      - name: 提交并推送
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add ai-intel-brief/website/index.html
          git commit -m "auto: 每日简报 $(date +%Y-%m-%d) [skip ci]" || echo "没有变更"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
